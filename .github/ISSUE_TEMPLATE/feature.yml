name: Feature Request

description: Suggest a new topic, visualizer, or enhancement

title: "feat: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

  - type: textarea
    id: feature
    attributes:
      label: Feature Description
      description: A clear description of the feature
      placeholder: Describe the feature in detail
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this be useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered
      placeholder: Describe any alternatives you thought of

  - type: textarea
    id: curriculum
    attributes:
      label: Curriculum Context
      description: How does this fit into BTech CSE curriculum?
      placeholder: Which course, semester, or topic does this relate to?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I am willing to help implement this feature
        - label: I understand this should follow the OpenCS pedagogy standards